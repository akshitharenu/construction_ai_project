version: "3.9"

services:

  # ── Agentspan server ────────────────────────────────────────────────────────
  agentspan:
    image: agentspan/server:latest
    ports:
      - "6767:6767"
    volumes:
      - agentspan_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health"]
      interval: 10s
      retries: 5

  # ── OpenTelemetry collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # gRPC (used by the Python SDK)
      - "55679:55679" # zpages debug UI
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - jaeger

  # ── Jaeger — trace viewer ───────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI  → open http://localhost:16686
      - "14250:14250"   # gRPC from collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ── Construction AI app ─────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - AGENTSPAN_SERVER_URL=http://agentspan:6767
    depends_on:
      agentspan:
        condition: service_healthy
      otel-collector:
        condition: service_started
    command: uvicorn webhook_server:app --host 0.0.0.0 --port 8000

volumes:
  agentspan_data:
