services:
  - type: web
    name: construction-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DEFAULT_PROJECT_ID
        value: PROJ-001
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: SENDGRID_API_KEY
        value: ""
      - key: REPORT_EMAIL_TO
        value: ""
      - key: PM_WHATSAPP_NUMBER
        value: "+971500000000"
